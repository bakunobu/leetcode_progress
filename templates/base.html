<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}LeetCode Progress{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">LeetCode Progress</a>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Dashboard</a></li>
                <li><a href="{{ url_for('plot') }}">Progress Plot</a></li>
                <li><a href="{{ url_for('refresh') }}" class="btn-refresh">Refresh Data</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>LeetCode Progress Tracker</p>
    </footer>
</body>
</html>
